<style>
/* ============================================
   マイナーズ30周年記念 特設サイト
   --------------------------------------------
   Illustratorで制作したデザインを
   スライス画像として書き出し、
   HTMLへ縦に配置する構成です。

   デザイン基準幅：750pt
   書き出し画像：1500px（@2x）

   ※画像本体は編集せず、
     CSS・JavaScriptのみで
     サイト全体のデザインや動きを調整します。
============================================ */
  /* ============================================
   CSS Index

   1. 基本設定
   2. ページ本体
   3. YouTubeエリア
   4. スマートフォン表示
   5. MENUボタン
   6. オーバーレイ
   7. ドロワーメニュー
   8. ページトップボタン
============================================ */
  /* ============================================
   基本設定
============================================ */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html{scroll-behavior:smooth;}
  html,
body {
  margin: 0;
  padding: 0;
  background: #0b0b0b url("images/background-brand.png") center center fixed no-repeat;
  background-size: cover;
}
/* ============================================
   ページ本体
   Illustratorから書き出した
   全スライス画像をまとめる領域

   ・PC最大1000px
   ・スマホでは画面いっぱい
   ・中央配置
============================================ */
.page {
  width: 95%;
  max-width: 1000px;
  margin: 40px auto;
  background: #fff;

/* Illustratorから書き出した画像同士に
   隙間が発生しないようにする */
  font-size: 0;
  line-height: 0;

  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 20px 80px rgba(0,0,0,.45);
}
/* 各スライス画像

   display:block
      → img特有の余白を除去

   width:100%
      → ページ幅いっぱいに表示

   height:auto
      → 縦横比を保持
*/
  .page img {
    display: block;
    width: 100%;
    height: auto;
  }
/* スライス画像全体を
   ボタンとしてクリック可能にする */
  .page a {
    display: block;
  }
/* ============================================
   YouTube動画エリア

   Illustratorでは3枚の画像として
   書き出しているため、
   CSSで横一列に並べて表示する。
============================================ */
  .yt-row {
    display: flex;
  }
  .yt-row a {
    /* 3分割スライス(各500px/1500px = 1/3) */
    flex: 1 1 33.3333%;
    min-width: 0;
  }
  .yt-row a img {
    width: 100%;
  }
  /* ============================================
   スマートフォン表示

   ・ページ幅100%
   ・角丸なし
   ・影なし
   ・ボタン位置調整
============================================ */
@media (max-width:768px){

.page{

width:100%;
max-width:750px;

margin:0 auto;

border-radius:0;

box-shadow:none;

}

.menu-btn{

right:18px;

top:18px;

}
.to-top{

right:18px;

bottom:18px;

width:48px;

height:48px;

font-size:20px;

}

}
  /* ============================================
   MENUボタン

   画面右上に固定表示
   ガラス風デザイン
============================================ */
.menu-btn{
position:fixed;
top:20px;
right:calc((100vw - min(1000px,95vw))/2 + 20px);

width:78px;
height:46px;

border:none;
border-radius:24px;

background:rgba(28,28,28,.35);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

color:#e4c56c;

font:700 14px/46px "Helvetica Neue",sans-serif;
letter-spacing:.12em;
text-align:center;

cursor:pointer;

transition:.25s;

box-shadow:
0 10px 30px rgba(0,0,0,.35);

z-index:10000;
}
  .menu-btn:hover{

transform:translateY(-2px);

background:rgba(45,45,45,.55);

box-shadow:
0 14px 36px rgba(0,0,0,.45);

}
.menu-btn.hide{

    opacity:0;

    transform:translateY(-10px);

    pointer-events:none;

}
  /* ============================================
   オーバーレイ

   ドロワーメニュー表示時に
   背景を暗くするレイヤー
============================================ */
.overlay{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.45);

    opacity:0;
    visibility:hidden;

    transition:.25s;

    z-index:9998;

}

.overlay.open{

    opacity:1;
    visibility:visible;

}
  /* ============================================
   スライドメニュー

   MENUボタンから表示される
   右側ドロワーメニュー
============================================ */
.drawer{
position:fixed;
top:0;
right:-340px;

width:220px;
max-width:65%;

height:100%;

padding:70px 20px;

background:rgba(18,18,18,.62);

backdrop-filter:blur(26px);
-webkit-backdrop-filter:blur(26px);

border-left:
1px solid rgba(255,255,255,.08);

color:#fff;

transition:.35s;

overflow:auto;

z-index:9999;
}
.drawer.open{right:0}
.drawer h2{

font:700 28px "Helvetica Neue",sans-serif;

letter-spacing:.18em;

text-align:center;

.drawer a{

padding:13px 10px;

text-decoration:none;

color:white;

font:14px "Helvetica Neue",sans-serif;

letter-spacing:.06em;

border-bottom:
1px solid rgba(255,255,255,.08);

transition:.25s;

}
  .drawer a:hover{

padding-left:24px;

color:#e4c56c;

}
   /* ============================================
   SNSエリア
============================================ */

.drawer-sns{

border-top:
1px solid rgba(255,255,255,.08);

}

.drawer-sns p{

.drawer-sns a{

}
  /* ============================================
   ページトップへ戻るボタン

   スクロール時のみ表示
============================================ */
.to-top{
    position:fixed;

    right:24px;
    bottom:24px;

    transition:
        opacity .25s,

}
.to-top span{

}
.to-top.show{
    opacity:1;
}

.to-top:hover{
    transform:translateY(-3px);

}
.to-top .arrow{
    font-size:20px;

}

.to-top .label{
    font-size:12px;      /* 9px→12px */

    line-height:1;
    margin-top:-2px;
}
/* ============================================

============================================ */

.comment-btn{

/* ============================================

============================================ */

.comment-overlay{

    position:fixed;

    opacity:0;
    visibility:hidden;

    transition:.25s;

.comment-window{

    text-align:center;

    visibility:hidden;

    transition:.25s;

    z-index:9999;
}

.comment-window.show{

    opacity:1;
    visibility:visible;

    transform:
        translate(-50%,-50%);

}

.comment-overlay.show{

    opacity:1;
    visibility:visible;

}

.comment-window h3{

    color:#e4c56c;

    margin-bottom:16px;

}
.comment-header{

    display:flex;

    align-items:center;

    justify-content:space-between;

}

.comment-header h3{

    margin:0;

.comment-window p{

.comment-link{

    font-weight:bold;

}

.comment-link:hover{

    opacity:.9;

}

.comment-close{

    position:absolute;

    top:12px;
    right:12px;

    width:36px;
    height:36px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:transparent;

    font-size:24px;

    cursor:pointer;

    transition:
        background .25s,
        color .25s,
        transform .25s;

}

.comment-close:hover{

    background:rgba(255,255,255,.10);

    color:white;

    transform:rotate(90deg);

}

<script>
const b=document.getElementById('menuBtn'),d=document.getElementById('drawer'),o=document.getElementById('overlay');
function c(){d.classList.remove('open');o.classList.remove('open')}
b.onclick=()=>{d.classList.toggle('open');o.classList.toggle('open')};
o.onclick=c;
document.querySelectorAll('.drawer a').forEach(a=>a.onclick=c);
/* 初期状態ではMENUを隠す */
b.classList.add("hide");

/* 少しスクロールしたら表示 */
addEventListener("scroll",()=>{

    b.classList.toggle("hide",scrollY<20);

});
const t=document.getElementById('toTop');
addEventListener('scroll',()=>t.classList.toggle('show',scrollY>500));

const commentBtn = document.getElementById("commentBtn");
const commentWindow = document.getElementById("commentWindow");
const commentOverlay = document.getElementById("commentOverlay");
const commentClose = document.getElementById("commentClose");

commentBtn.addEventListener("click", function(e){

    e.preventDefault();

    commentWindow.classList.add("show");
    commentOverlay.classList.add("show");

});

commentClose.addEventListener("click", function(){

    commentWindow.classList.remove("show");
    commentOverlay.classList.remove("show");

});

commentOverlay.addEventListener("click", function(){

    commentWindow.classList.remove("show");
    commentOverlay.classList.remove("show");

});
const commentLink = document.getElementById("commentLink");

commentLink.addEventListener("click", function(){

    commentWindow.classList.remove("show");
    commentOverlay.classList.remove("show");

});
</script>
