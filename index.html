<style>
  /* ============================================
     マイナーズウェブ 画像スライス構成
     元データ: Illustrator制作 750pt幅(@2x = 1500px)
     ============================================ */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html, body {
    background: #000;
  }
  /* ページ全体のラッパー(最大幅750px、中央寄せ) */
  .page {
    max-width: 750px;
    margin: 0 auto;
    background: #fff;
    /* スライス間の隙間防止 */
    font-size: 0;
    line-height: 0;
  }
  /* 各スライス画像:幅100%で隙間なく縦に連結 */
  .page img {
    display: block;
    width: 100%;
    height: auto;
  }
  /* リンク帯(ボタン) */
  .page a {
    display: block;
  }
  /* YouTube動画3列の行 */
  .yt-row {
    display: flex;
  }
  .yt-row a {
    /* 3分割スライス(各500px/1500px = 1/3) */
    flex: 1 1 33.3333%;
    min-width: 0;
  }
  .yt-row a img {
    width: 100%;
  }

html{scroll-behavior:smooth;}
.menu-btn{position:fixed;top:18px;right:calc((100vw - min(750px,100vw))/2 + 18px);width:52px;height:52px;border:none;border-radius:50%;background:rgba(0,0,0,.75);color:#fff;font-size:28px;cursor:pointer;z-index:10000}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;visibility:hidden;transition:.25s;z-index:9998}
.overlay.open{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;right:-320px;width:300px;max-width:80%;height:100%;background:#111;color:#fff;transition:.25s;z-index:9999;padding:72px 24px;overflow:auto}
.drawer.open{right:0}
.drawer h2{font:700 22px sans-serif;color:#d8b04c;margin:0 0 18px}
.drawer a{display:block;color:#fff;text-decoration:none;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.15);font:16px sans-serif}
.to-top{position:fixed;right:18px;bottom:18px;width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;text-decoration:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;z-index:9997}
.to-top.show{opacity:1}

</style>
</head>

<a href="#" class="to-top" id="toTop">↑</a>
<script>
const b=document.getElementById('menuBtn'),d=document.getElementById('drawer'),o=document.getElementById('overlay');
function c(){d.classList.remove('open');o.classList.remove('open')}
b.onclick=()=>{d.classList.toggle('open');o.classList.toggle('open')};
o.onclick=c;
document.querySelectorAll('.drawer a').forEach(a=>a.onclick=c);
const t=document.getElementById('toTop');
addEventListener('scroll',()=>t.classList.toggle('show',scrollY>500));
</script>
